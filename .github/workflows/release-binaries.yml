name: release-binaries

# Cross-compiles the --NAT-enabled gost into real static Linux binaries on
# GitHub's runners and publishes them as GitHub Release assets: the raw
# uncompressed binaries gost-linux-amd64 / gost-linux-arm64 (curl-able directly),
# each with a .sha256. Binaries are NOT stripped (no -s -w): keeping the symbol
# table reduces antivirus false-positives on Go binaries.
#
# Trigger: push a tag matching v*  (e.g. `git tag v2.14 && git push origin v2.14`).
# A manual workflow_dispatch run builds the artifacts but does NOT publish a
# Release (the release job is gated on a tag ref).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Least privilege: the default token is read-only; only the release job is
# granted contents: write (to create the Release / upload assets).
permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build raw binary (CGO disabled, NOT stripped)
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          # No -s -w: keeping the symbol table reduces antivirus false-positives
          # on the Go binary. -trimpath keeps the build reproducible.
          out="gost-${GOOS}-${GOARCH}"
          go build -trimpath -o "$out" ./cmd/gost
          sha256sum "$out" > "$out.sha256"
          ls -l "$out"
          file "$out" || true
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goarch }}
          path: |
            gost-${{ matrix.goos }}-${{ matrix.goarch }}
            gost-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binaries-*
          merge-multiple: true
      - name: List assets
        run: ls -lR dist
      # Third-party action pinned to an immutable commit SHA (supply-chain).
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
